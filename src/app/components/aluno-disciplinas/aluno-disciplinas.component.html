<section class="workspace-area">
  <div class="navigation-header">
    <button class="btn-return" (click)="voltar()">
      <span class="arrow">↤</span> Voltar ao Painel
    </button>
  </div>

  <header class="header-title-block">
    <h1 class="page-heading">Matérias Vinculadas — RA: {{ ra }}</h1>
  </header>

  <div *ngIf="carregando" class="status-box status-loading">
    Buscando a grade de disciplinas...
  </div>
  
  <div *ngIf="erro" class="status-box status-failure">
    Aviso: {{ erro }}
  </div>

  <div class="content-wrapper" *ngIf="!carregando && !erro">
    <div *ngIf="disciplinas.length === 0" class="status-box status-empty">
      Este estudante não possui disciplinas registradas até o momento.
    </div>

    <div class="grid-container" *ngIf="disciplinas.length > 0">
      <table class="data-table-view">
        <thead>
          <tr>
            <th>Identificador</th>
            <th>Nome do Curso</th>
            <th>Catedrático</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of disciplinas" class="table-row">
            <td class="code-highlight">{{ item.codigo }}</td>
            <td class="subject-name">{{ item.nome }}</td>
            <td class="instructor-info">{{ item.professor }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
